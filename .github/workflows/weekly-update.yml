name: Weekly content update

on:
  schedule:
    # 毎週月曜 09:00 JST = 日曜 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-update
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        working-directory: scripts
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape subsidy pages
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrape_subsidies.py

      - name: Generate subsidy articles
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_subsidy_articles.py

      - name: Generate AI tips article
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_ai_tips.py

      - name: Generate training article
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_training.py

      - name: Build article pages
        working-directory: scripts
        run: python build_article_pages.py

      - name: Commit and push changes
        run: |
          git config user.name "kaigo-navi-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ articles/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly content update $(date -u +%Y-%m-%d)"
          git push
